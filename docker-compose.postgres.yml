services:
  postgres:
    image: postgres:16-alpine
    container_name: datafle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: datafle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - datafle_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d datafle"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  datafle_postgres_data:
